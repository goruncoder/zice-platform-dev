name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CORE_REF: ${{ github.event_name == 'pull_request' && 'cursor/local-dev-auth-20260518' || 'merge-all' }}
      FRONTEND_REF: ${{ github.event_name == 'pull_request' && 'cursor/local-admin-workspace-20260518' || 'merge-all' }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout zice-core
        uses: actions/checkout@v4
        with:
          repository: goruncoder/zice-core
          ref: ${{ env.CORE_REF }}
          path: repos/zice-core
          token: ${{ secrets.SERVICE_REPO_TOKEN || github.token }}

      - name: Checkout zice-frontend
        uses: actions/checkout@v4
        with:
          repository: goruncoder/zice-frontend
          ref: ${{ env.FRONTEND_REF }}
          path: repos/zice-frontend
          token: ${{ secrets.SERVICE_REPO_TOKEN || github.token }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: repos/zice-core/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: repos/zice-frontend/package-lock.json

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: make install

      - name: Configure environment
        run: cp .env.example .env

      - name: Run integration tests (bootstrap + verify + teardown)
        run: make integration-ci
